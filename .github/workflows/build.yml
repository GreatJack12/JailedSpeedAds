name: Build DEB
on: [push, workflow_dispatch]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Theos
        run: |
          set -e
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -fsSL https://github.com/theos/sdks/releases/download/2024Q4/iPhoneOS16.5.sdk.tar.xz -o sdk.tar.xz
          tar -xf sdk.tar.xz -C $THEOS/sdks

      - name: Build DEB
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: adspeed-deb
          path: packages/*.deb
